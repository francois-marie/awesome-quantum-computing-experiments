name: PR Highlight Plots

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'data/*.csv'

concurrency:
  group: pr-highlight-${{ github.event.pull_request.number }}-${{ github.event.action }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  highlight:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Diff added CSV rows
      id: diff
      run: |
        MERGE_BASE=$(git merge-base \
          "${{ github.event.pull_request.base.sha }}" \
          "${{ github.event.pull_request.head.sha }}")
        python scripts/diff_csv_rows.py \
          "$MERGE_BASE" \
          "${{ github.event.pull_request.head.sha }}" \
          data/qec_exp.csv \
          data/msd_exp.csv \
          data/entangled_state_error_exp.csv \
          data/qubit_count.csv \
          data/physical_qubits.csv \
          > /tmp/highlights.json
        if [ "$(cat /tmp/highlights.json)" = "{}" ]; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Generate highlight PNGs
      if: steps.diff.outputs.has_changes == 'true'
      run: python -m src.plotting.highlight_runner /tmp/highlights.json

    - name: Deploy highlight PNGs to gh-pages-assets
      if: steps.diff.outputs.has_changes == 'true'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out/png/highlights
        publish_branch: gh-pages-assets
        destination_dir: previews/pr-${{ github.event.pull_request.number }}
        keep_files: true
        commit_message: "Update PR preview plots for #${{ github.event.pull_request.number }}"

    - name: Build PR comment body
      if: steps.diff.outputs.has_changes == 'true'
      run: |
        python scripts/build_pr_highlight_comment.py \
          /tmp/highlights.json \
          /tmp/comment_body.md \
          "${{ github.repository }}" \
          "${{ github.event.pull_request.number }}" \
          "${{ github.event.pull_request.head.sha }}" \
          out/png/highlights

    - name: Post sticky PR comment
      if: steps.diff.outputs.has_changes == 'true'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: pr-highlight-plots
        path: /tmp/comment_body.md

  cleanup:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: gh-pages-assets
        fetch-depth: 0

    - name: Remove PR preview folder
      run: |
        PREVIEW_DIR="previews/pr-${{ github.event.pull_request.number }}"
        if [ ! -d "$PREVIEW_DIR" ]; then
          echo "No preview folder to remove."
          exit 0
        fi
        git rm -rf "$PREVIEW_DIR"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        if git diff --cached --quiet; then
          echo "Nothing staged after git rm."
          exit 0
        fi
        git commit -m "Remove preview for closed PR #${{ github.event.pull_request.number }}"
        for attempt in 1 2 3; do
          if git pull --rebase origin gh-pages-assets && git push origin gh-pages-assets; then
            exit 0
          fi
          sleep 5
        done
        echo "Failed to push cleanup after 3 attempts."
        exit 1
