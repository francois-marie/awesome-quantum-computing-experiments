name: Generate Plots

on:
  push:
    branches:
      - main
    paths:
      - 'data/*.csv'
      - 'src/plotting/**'
      - 'config.yaml'
  workflow_dispatch:

jobs:
  generate-plots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Generate plots
      run: |
        make plots

    - name: Deploy plot JS to gh-pages-assets branch
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out/js
        publish_branch: gh-pages-assets
        destination_dir: js
        keep_files: false
        commit_message: "Update plot JS assets"
