name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Verify README is up to date with CSV data
      run: |
        make readme
        if ! git diff --quiet -- README.md; then
          echo "::error::README.md is out of date with the CSV data. Run 'make readme' locally and commit the result."
          git diff -- README.md
          exit 1
        fi

    - name: Run tests
      run: |
        pytest tests/
